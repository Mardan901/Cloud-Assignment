<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register - Steelworks Inc.</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid #003366;
        }

        h2 {
            color: #003366;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #003366;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #002244;
        }

        a {
            color: #003366;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        label {
            text-align: left;
            display: block;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Create an Account</h2>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Join the SJNG Resources Sdn Bhd client portal.</p>

        <form method="POST" action="register_process.php">
            <label>Username:</label>
            <input type="text" name="username" required placeholder="Choose a username">

            <label>Password:</label>
            <input type="password" name="password" required placeholder="Create a strong password">

            <label>Account Type:</label>
            <select name="role" required>
                <option value="client">Customer / Client</option>
                <option value="admin">Admin Staff</option>
            </select>

            <button type="submit">Register Now</button>
        </form>

        <p style="margin-top: 20px; font-size: 14px;">Already have an account? <a href="login.php">Login here</a>.</p>
    </div>

</body>

</html>
